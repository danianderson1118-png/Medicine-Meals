<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Medicine Meals</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #c7d1cc;
}

.header {
  background: #6f8f7f;
  color: white;
  padding: 18px;
  font-size: 22px;
  text-align: center;
  font-weight: 600;
}

.container {
  padding: 16px;
}

.card {
  background: #e6e8e7;
  padding: 18px;
  margin: 14px 0;
  border-radius: 16px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.12);
  font-size: 20px;
  font-weight: 500;
  cursor: pointer;
}

.back {
  margin: 10px 0;
  font-size: 18px;
  cursor: pointer;
  color: #2f3e37;
}

.food-list {
  background: #e6e8e7;
  padding: 18px;
  border-radius: 16px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.12);
  line-height: 1.6;
  font-size: 18px;
}
</style>
</head>

<body>

<div class="header">Medicine Meals</div>
<div class="container" id="app"></div>

<script>
const app = document.getElementById("app");

const data = {
  headache: {
    "Liver Yang Rising": "Celery, spinach, banana, cucumber, peppermint",
    "Blood Deficiency": "Carrot, beet, grape, egg, chicken liver",
    "Wind Cold": "Ginger, scallion, garlic, cinnamon"
  },
  diarrhea: {
    "Cold": "Ginger, cinnamon, rice, chicken, dates",
    "Damp Heat": "Mung bean, cucumber, bitter melon, celery",
    "Spleen Weak": "Sweet potato, rice, squash, oats"
  },
  hiccups: {
    "Cold": "Ginger, cinnamon, fennel, mustard seed",
    "Heat": "Banana, cucumber, spinach, peppermint",
    "Deficiency": "Rice, dates, chicken, yam"
  },
  nosebleed: {
    "Lung Heat": "Apple, pear, tomato, mung bean",
    "Stomach Heat": "Cucumber, banana, spinach, lily bulb",
    "Liver Heat": "Celery, bitter greens, mung bean"
  },
  vomiting: {
    "Cold": "Ginger, cinnamon, fennel, rice",
    "Indigestion": "Radish, hawthorn, barley malt",
    "Phlegm": "Tangerine peel, ginger, rice"
  },
  voice: {
    "Wind Cold": "Ginger, scallion, garlic, peppermint",
    "Heat": "Pear, honey, lily bulb, loquat",
    "Phlegm": "Radish, tangerine peel, ginger"
  },
  cough: {
    "Wind Cold": "Ginger, scallion, garlic",
    "Wind Heat": "Pear, mint, mulberry leaf",
    "Dryness": "Pear, honey, almond",
    "Phlegm": "Radish, tangerine peel, ginger"
  }
};

function clear() {
  app.innerHTML = "";
}

function createCard(text, onClick) {
  const div = document.createElement("div");
  div.className = "card";
  div.textContent = text;
  div.onclick = onClick;
  return div;
}

function showBack(fn) {
  const back = document.createElement("div");
  back.className = "back";
  back.textContent = "← Back";
  back.onclick = fn;
  app.appendChild(back);
}

function showHome() {
  clear();

  const categories = [
    ["Headache", "headache"],
    ["Diarrhea", "diarrhea"],
    ["Hiccups", "hiccups"],
    ["Nosebleed", "nosebleed"],
    ["Vomiting", "vomiting"],
    ["Loss of Voice", "voice"],
    ["Cough", "cough"]
  ];

  categories.forEach(([label, key]) => {
    app.appendChild(createCard(label, () => showPatterns(key)));
  });
}

function showPatterns(category) {
  clear();
  showBack(showHome);

  const patterns = data[category];

  Object.keys(patterns).forEach(pattern => {
    app.appendChild(
      createCard(pattern, () => showFoods(category, pattern))
    );
  });
}

function showFoods(category, pattern) {
  clear();
  showBack(() => showPatterns(category));

  const title = document.createElement("div");
  title.className = "card";
  title.textContent = pattern;
  app.appendChild(title);

  const foods = document.createElement("div");
  foods.className = "food-list";
  foods.textContent = data[category][pattern];
  app.appendChild(foods);
}

showHome();
</script>

</body>
</html>
