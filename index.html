<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Medicine Meals</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #c7d1cc;
}

.header {
  background: #6f8f7f;
  color: white;
  padding: 18px;
  font-size: 22px;
  text-align: center;
  font-weight: 600;
}

.container {
  padding: 16px;
}

.card {
  background: #e6e8e7;
  padding: 18px;
  margin: 14px 0;
  border-radius: 16px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.12);
  cursor: pointer;
}

.title {
  font-size: 20px;
  font-weight: 600;
}

.sub {
  font-size: 15px;
  color: #5f6a66;
  margin-top: 4px;
}

.back {
  margin: 10px 0;
  font-size: 18px;
  cursor: pointer;
  color: #2f3e37;
}

.food-list {
  background: #e6e8e7;
  padding: 18px;
  border-radius: 16px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.12);
  line-height: 1.6;
  font-size: 18px;
}
</style>
</head>

<body>

<div class="header">Medicine Meals</div>
<div class="container" id="app"></div>

<script>
const app = document.getElementById("app");

const data = {
  headache: {
    symptoms: [
      {
        title: "Temple headache",
        sub: "Throbbing or pulsing",
        foods: "Celery, spinach, banana, cucumber, peppermint"
      },
      {
        title: "Heavy headache",
        sub: "Foggy or dizzy feeling",
        foods: "Ginger, scallion, garlic, basil"
      },
      {
        title: "Dull headache",
        sub: "From exhaustion or deficiency",
        foods: "Carrot, beet, egg, chicken, dates"
      }
    ]
  },

  diarrhea: {
    symptoms: [
      {
        title: "Cold diarrhea",
        sub: "Pain improves with warmth",
        foods: "Ginger, cinnamon, rice, chicken, fennel"
      },
      {
        title: "Damp heat diarrhea",
        sub: "Foul smell, urgency",
        foods: "Mung bean, cucumber, celery, bitter greens"
      }
    ]
  },

  hiccups: {
    symptoms: [
      {
        title: "Forceful hiccups",
        sub: "Often with cold hands or feet",
        foods: "Ginger, cinnamon, fennel, mustard seed"
      },
      {
        title: "Loud hiccups",
        sub: "Heat signs present",
        foods: "Banana, cucumber, spinach, peppermint"
      },
      {
        title: "Weak hiccups",
        sub: "Low energy or fatigue",
        foods: "Rice, dates, chicken, yam"
      }
    ]
  }
};

function clear() {
  app.innerHTML = "";
}

function showBack(fn) {
  const back = document.createElement("div");
  back.className = "back";
  back.textContent = "← Back";
  back.onclick = fn;
  app.appendChild(back);
}

function createCard(title, sub, onClick) {
  const div = document.createElement("div");
  div.className = "card";

  const t = document.createElement("div");
  t.className = "title";
  t.textContent = title;

  div.appendChild(t);

  if (sub) {
    const s = document.createElement("div");
    s.className = "sub";
    s.textContent = sub;
    div.appendChild(s);
  }

  div.onclick = onClick;
  return div;
}

function showHome() {
  clear();

  const categories = [
    ["Headache", "headache"],
    ["Diarrhea", "diarrhea"],
    ["Hiccups", "hiccups"]
  ];

  categories.forEach(([label, key]) => {
    app.appendChild(createCard(label, "", () => showSymptoms(key)));
  });
}

function showSymptoms(category) {
  clear();
  showBack(showHome);

  data[category].symptoms.forEach(symptom => {
    app.appendChild(
      createCard(
        symptom.title,
        symptom.sub,
        () => showFoods(category, symptom)
      )
    );
  });
}

function showFoods(category, symptom) {
  clear();
  showBack(() => showSymptoms(category));

  const foods = document.createElement("div");
  foods.className = "food-list";
  foods.textContent = symptom.foods;
  app.appendChild(foods);
}

showHome();
</script>

</body>
</html>
