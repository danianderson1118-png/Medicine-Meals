<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Medicine Meals</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #c7d1cc;
}

.header {
  background: #6f8f7f;
  color: white;
  padding: 18px;
  font-size: 22px;
  text-align: center;
  font-weight: 600;
}

.container {
  padding: 16px;
}

.card {
  background: #e6e8e7;
  padding: 18px;
  margin: 14px 0;
  border-radius: 16px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.12);
  font-size: 20px;
  font-weight: 500;
  cursor: pointer;
}

.back {
  margin: 10px 0;
  font-size: 18px;
  cursor: pointer;
  color: #2f3e37;
}

.food-list {
  background: #e6e8e7;
  padding: 18px;
  border-radius: 16px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.12);
  line-height: 1.6;
  font-size: 18px;
}
</style>
</head>

<body>

<div class="header">Medicine Meals</div>
<div class="container" id="app"></div>

<script>
const app = document.getElementById("app");

const data = {
  headache: {
    symptoms: [
      { name: "Temple throbbing headache",
        foods: "Celery, spinach, banana, cucumber, peppermint" },

      { name: "Heavy foggy headache",
        foods: "Ginger, scallion, garlic, basil" },

      { name: "Dull headache from exhaustion",
        foods: "Carrot, beet, egg, chicken, dates" }
    ]
  },

  diarrhea: {
    symptoms: [
      { name: "Cold abdominal pain with diarrhea",
        foods: "Ginger, cinnamon, rice, chicken, fennel" },

      { name: "Foul smelling urgent diarrhea",
        foods: "Mung bean, cucumber, celery, bitter greens" }
    ]
  },

  hiccups: {
    symptoms: [
      { name: "Forceful hiccups often with cold hands or feet",
        foods: "Ginger, cinnamon, fennel, mustard seed" },

      { name: "Loud hiccups with heat signs",
        foods: "Banana, cucumber, spinach, peppermint" },

      { name: "Weak hiccups",
        foods: "Rice, dates, chicken, yam" }
    ]
  }
};

function clear() {
  app.innerHTML = "";
}

function createCard(text, onClick) {
  const div = document.createElement("div");
  div.className = "card";
  div.textContent = text;
  div.onclick = onClick;
  return div;
}

function showBack(fn) {
  const back = document.createElement("div");
  back.className = "back";
  back.textContent = "← Back";
  back.onclick = fn;
  app.appendChild(back);
}

function showHome() {
  clear();

  const categories = [
    ["Headache", "headache"],
    ["Diarrhea", "diarrhea"],
    ["Hiccups", "hiccups"]
  ];

  categories.forEach(([label, key]) => {
    app.appendChild(createCard(label, () => showSymptoms(key)));
  });
}

function showSymptoms(category) {
  clear();
  showBack(showHome);

  data[category].symptoms.forEach(symptom => {
    app.appendChild(
      createCard(symptom.name, () => showFoods(category, symptom))
    );
  });
}

function showFoods(category, symptom) {
  clear();
  showBack(() => showSymptoms(category));

  const title = document.createElement("div");
  title.className = "card";
  title.textContent = symptom.name;
  app.appendChild(title);

  const foods = document.createElement("div");
  foods.className = "food-list";
  foods.textContent = symptom.foods;
  app.appendChild(foods);
}

showHome();
</script>

</body>
</html>
