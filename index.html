<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Medicine Meals</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #c7d1cc;
}

.header {
  background: #6f8f7f;
  color: white;
  padding: 18px;
  font-size: 22px;
  text-align: center;
  font-weight: 600;
}

.container {
  padding: 16px;
}

.card {
  background: #e6e8e7;
  padding: 18px;
  margin: 14px 0;
  border-radius: 16px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.12);
  font-size: 20px;
  font-weight: 500;
  cursor: pointer;
}

.card:hover {
  opacity: 0.9;
}

.back {
  margin: 10px 0;
  font-size: 18px;
  cursor: pointer;
  color: #2f3e37;
}

.food-list {
  background: #e6e8e7;
  padding: 18px;
  border-radius: 16px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.12);
  line-height: 1.6;
  font-size: 18px;
}
</style>
</head>

<body>

<div class="header">Medicine Meals</div>

<div class="container" id="app"></div>

<script>
const app = document.getElementById("app");

function showHome() {
  app.innerHTML = `
    <div class="card" onclick="showPatterns('headache')">Headache</div>
    <div class="card" onclick="showPatterns('diarrhea')">Diarrhea</div>
    <div class="card" onclick="showPatterns('hiccups')">Hiccups</div>
    <div class="card" onclick="showPatterns('nosebleed')">Nosebleed</div>
    <div class="card" onclick="showPatterns('vomiting')">Vomiting</div>
    <div class="card" onclick="showPatterns('voice')">Loss of Voice</div>
    <div class="card" onclick="showPatterns('cough')">Cough</div>
  `;
}

const data = {

headache: {
  "Liver Yang Rising": "Celery, spinach, banana, cucumber, peppermint",
  "Blood Deficiency": "Carrot, beet, grape, egg, chicken liver",
  "Wind Cold": "Ginger, scallion, garlic, cinnamon"
},

diarrhea: {
  "Cold": "Ginger, cinnamon, rice, chicken, dates",
  "Damp Heat": "Mung bean, cucumber, bitter melon, celery",
  "Spleen Weak": "Sweet potato, rice, squash, oats"
},

hiccups: {
  "Cold": "Ginger, cinnamon, fennel, mustard seed",
  "Heat": "Banana, cucumber, spinach, peppermint",
  "Deficiency": "Rice, dates, chicken, yam"
},

nosebleed: {
  "Lung Heat": "Apple, pear, tomato, mung bean",
  "Stomach Heat": "Cucumber, banana, spinach, lily bulb",
  "Liver Heat": "Celery, bitter greens, mung bean"
},

vomiting: {
  "Cold": "Ginger, cinnamon, fennel, rice",
  "Indigestion": "Radish, hawthorn, barley malt",
  "Phlegm": "Tangerine peel, ginger, rice"
},

voice: {
  "Wind Cold": "Ginger, scallion, garlic, peppermint",
  "Heat": "Pear, honey, lily bulb, loquat",
  "Phlegm": "Radish, tangerine peel, ginger"
},

cough: {
  "Wind Cold": "Ginger, scallion, garlic",
  "Wind Heat": "Pear, mint, mulberry leaf",
  "Dryness": "Pear, honey, almond",
  "Phlegm": "Radish, tangerine peel, ginger"
}

};

function showPatterns(category) {
  const patterns = data[category];

  let html = `<div class="back" onclick="showHome()">← Back</div>`;

  for (let key in patterns) {
    html += `<div class="card" onclick="showFoods('${category}','${key}')">${key}</div>`;
  }

  app.innerHTML = html;
}

function showFoods(category, pattern) {
  const foods = data[category][pattern];

  app.innerHTML = `
    <div class="back" onclick="showPatterns('${category}')">← Back</div>
    <div class="card">${pattern}</div>
    <div class="food-list">${foods}</div>
  `;
}

showHome();
</script>

</body>
</html>
