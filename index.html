<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medicine Meals</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  margin: 0;
  background: #dfe7e2;
}

.header {
  background: #6f8f7b;
  color: white;
  padding: 18px;
  font-size: 22px;
  text-align: center;
  font-weight: 600;
}

.screen {
  padding: 16px;
}

.card {
  background: #f4f6f5;
  padding: 16px;
  margin-bottom: 12px;
  border-radius: 14px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.15);
  cursor: pointer;
  font-size: 18px;
  font-weight: 500;
}

.card:hover {
  background: #e9efec;
}

.back {
  margin-bottom: 16px;
  color: #2f4f4f;
  font-weight: 600;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="header">Medicine Meals</div>

<div id="main" class="screen">

  <div class="card" onclick="openScreen('headache')">Headache</div>
  <div class="card" onclick="openScreen('diarrhea')">Diarrhea</div>
  <div class="card" onclick="openScreen('hiccups')">Hiccups</div>
  <div class="card" onclick="openScreen('nosebleed')">Nosebleed</div>
  <div class="card" onclick="openScreen('vomiting')">Vomiting</div>
  <div class="card" onclick="openScreen('voice')">Loss of Voice</div>
  <div class="card" onclick="openScreen('cough')">Cough</div>

</div>

<div id="content" class="screen" style="display:none;"></div>

<script>
function openScreen(name) {
  document.getElementById("main").style.display = "none";
  const content = document.getElementById("content");
  content.style.display = "block";

  content.innerHTML = `
    <div class="back" onclick="goBack()">← Back</div>
    <div class="card">${name.toUpperCase()}</div>
    <div class="card">Food list coming next</div>
  `;
}

function goBack() {
  document.getElementById("main").style.display = "block";
  document.getElementById("content").style.display = "none";
}
</script>

</body>
</html>
