<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medicine Meals</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #cfd8d3;
}

.header {
  background: #6f8f7f;
  color: white;
  padding: 18px;
  font-size: 22px;
  text-align: center;
  font-weight: bold;
}

.screen {
  display: none;
  padding: 16px;
}

.active {
  display: block;
}

.card {
  background: #e7ece9;
  padding: 18px;
  margin-bottom: 14px;
  border-radius: 12px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.15);
  cursor: pointer;
  font-size: 18px;
  font-weight: bold;
}

.food {
  cursor: default;
}

.back {
  margin-bottom: 14px;
  font-weight: bold;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="header">Medicine Meals</div>

<div id="home" class="screen active">
  <div class="card" data-target="headache">Headache</div>
</div>

<div id="headache" class="screen">
  <div class="back" data-target="home">← Back</div>
  <div class="card" data-target="temple">Temple headache • throbbing</div>
</div>

<div id="temple" class="screen">
  <div class="back" data-target="headache">← Back</div>
  <div class="card food">Celery</div>
  <div class="card food">Spinach</div>
  <div class="card food">Banana</div>
  <div class="card food">Cucumber</div>
  <div class="card food">Peppermint</div>
</div>

<script>
function showScreen(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

document.addEventListener("click", function(e) {
  const target = e.target.closest("[data-target]");
  if (!target) return;
  const screen = target.getAttribute("data-target");
  showScreen(screen);
});
</script>

</body>
</html>
